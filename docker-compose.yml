version: '3.8'

services:
  # --- BASE DE DONNÉES POSTGRESQL ---
  db:
    image: postgres:15-alpine
    container_name: postgres-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: habib
      POSTGRES_DB: iot_db
    ports:
      - "5433:5432"
    networks:
      - app-network
    volumes:
      - postgres-data:/var/lib/postgresql/data

  # --- BACKEND SPRING BOOT ---
  backend-api:
    build:
      context: ./back
      dockerfile: Dockerfile
    container_name: springboot-api
    environment:
      # Surcharge la configuration Spring pour pointer vers le conteneur 'db'
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/iot_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: habib
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    ports:
      - "8080:8080"
    depends_on:
      - db
    networks:
      - app-network

  # --- FRONTEND REACT ---
  frontend-ui:
    build:
      context: ./front
      dockerfile: Dockerfile
    container_name: react-ui
    ports:
      - "80:80"
    depends_on:
      - backend-api
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres-data: # Persistance des données