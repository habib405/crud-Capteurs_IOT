# Connexion locale (utilisée si on lance le projet depuis IntelliJ)
spring.datasource.url=jdbc:postgresql://localhost:5432/iot_db
spring.datasource.username=admin
spring.datasource.password=habib

# Configuration Hibernate / JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Eviter les erreurs de demarrage si la DB met un peu de temps a monter
spring.datasource.hikari.initialization-fail-timeout=0
spring.application.name=back
