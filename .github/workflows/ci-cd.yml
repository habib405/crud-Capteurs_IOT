name: CI/CD Pipeline AWS

on:
  push:
    branches:
      - main

jobs:
  # ==========================================
  # JOB 1 : TESTS (Vérification du code)
  # ==========================================
  test:
    name: Tester le code
    runs-on: ubuntu-latest
    
    # 1. On lance une base de données temporaire pour les tests
    services:
      db:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: habib
          POSTGRES_DB: iot_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration de Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Tests Backend (Spring Boot)
        # 2. On force Spring Boot à utiliser cette base temporaire locale
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/iot_db
          SPRING_DATASOURCE_USERNAME: admin
          SPRING_DATASOURCE_PASSWORD: habib
        run: |
          cd back
          chmod +x mvnw
          ./mvnw test

      - name: Configuration de Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Installation et Build Frontend (Vérification)
        run: |
          cd front
          npm install
          npm run build

  # ==========================================
  # JOB 2 : BUILD (Création et envoi des images)
  # ==========================================
  build:
    name: Construire et Pousser
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Connexion a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build et Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./back
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/capteurs-iot-api:latest

      - name: Build et Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./front
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/capteurs-iot-web:latest

  # ==========================================
  # JOB 3 : DEPLOY (Mise en ligne sur AWS K3s)
  # ==========================================
  deploy:
    name: Déployer sur Kubernetes (K3s)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploiement sur AWS EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Creer les dossiers
            mkdir -p ~/projet-iot/k8s
            cd ~/projet-iot

            # 2. Generer le YAML de la Base de Donnees 
            cat << 'EOF' > k8s/postgres.yaml
            apiVersion: v1
            kind: PersistentVolumeClaim
            metadata:
              name: postgres-data
            spec:
              accessModes: [ReadWriteOnce]
              resources: { requests: { storage: 1Gi } }
            ---
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: postgres-db
            spec:
              selector: { matchLabels: { app: postgres } }
              template:
                metadata: { labels: { app: postgres } }
                spec:
                  containers:
                  - name: postgres
                    image: postgres:15-alpine
                    env:
                    - name: POSTGRES_USER
                      value: admin
                    - name: POSTGRES_PASSWORD
                      value: habib
                    - name: POSTGRES_DB
                      value: iot_db
                    ports: [{ containerPort: 5432 }]
                    volumeMounts:
                    - name: db-data
                      mountPath: /var/lib/postgresql/data
                  volumes:
                  - name: db-data
                    persistentVolumeClaim: { claimName: postgres-data }
            ---
            apiVersion: v1
            kind: Service
            metadata:
              name: db
            spec:
              selector: { app: postgres }
              ports: [{ port: 5432 }]
            EOF

            # 3. Generer le YAML du Backend API
            cat << 'EOF' > k8s/backend.yaml
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: backend-api
            spec:
              selector: { matchLabels: { app: backend } }
              template:
                metadata: { labels: { app: backend } }
                spec:
                  containers:
                  - name: backend
                    image: ${{ secrets.DOCKERHUB_USERNAME }}/capteurs-iot-api:latest
                    imagePullPolicy: Always
                    env:
                    - name: SPRING_DATASOURCE_URL
                      value: jdbc:postgresql://db:5432/iot_db
                    - name: SPRING_DATASOURCE_USERNAME
                      value: admin
                    - name: SPRING_DATASOURCE_PASSWORD
                      value: habib
                    ports: [{ containerPort: 8080 }]
            ---
            apiVersion: v1
            kind: Service
            metadata:
              name: backend-service
            spec:
              type: LoadBalancer
              selector: { app: backend }
              ports: [{ port: 8080, targetPort: 8080 }]
            EOF

            # 4. Generer le YAML du Frontend React
            cat << 'EOF' > k8s/frontend.yaml
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: frontend-ui
            spec:
              selector: { matchLabels: { app: frontend } }
              template:
                metadata: { labels: { app: frontend } }
                spec:
                  containers:
                  - name: frontend
                    image: ${{ secrets.DOCKERHUB_USERNAME }}/capteurs-iot-web:latest
                    imagePullPolicy: Always
                    ports: [{ containerPort: 80 }]
            ---
            apiVersion: v1
            kind: Service
            metadata:
              name: frontend-service
            spec:
              type: LoadBalancer
              selector: { app: frontend }
              ports: [{ port: 80, targetPort: 80 }]
            EOF

            # 5. Ordonner a K3s de creer/mettre a jour l'infrastructure
            sudo kubectl apply -f k8s/
            
            # 6. Redemarrer les conteneurs pour forcer la recuperation des nouvelles images
            sudo kubectl rollout restart deployment backend-api frontend-ui
